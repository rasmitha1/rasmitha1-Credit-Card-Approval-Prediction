<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Credit Card Approval Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="header">
    SmartBridge
</div>

<div class="container">

<h1>Credit Card Approval Prediction</h1>

<p class="description">
Enter the applicant details below to predict the credit card approval status.
</p>

<form action="/predict" method="POST">

<div class="form-grid">

<div class="form-group">
<label>Gender</label>
<select name="CODE_GENDER">
    <option value="F">Female</option>
    <option value="M">Male</option>
</select>
</div>

<div class="form-group">
<label>Own Car</label>
<select name="FLAG_OWN_CAR">
    <option value="N">No</option>
    <option value="Y">Yes</option>
</select>
</div>

<div class="form-group">
<label>Own Real Estate</label>
<select name="FLAG_OWN_REALTY">
    <option value="N">No</option>
    <option value="Y">Yes</option>
</select>
</div>

<div class="form-group">
<label>Annual Income</label>
<input type="number" name="AMT_INCOME_TOTAL" placeholder="50000" required>
</div>

<div class="form-group">
<label>Income Type</label>
<select name="NAME_INCOME_TYPE">
<option>Working</option>
<option>Commercial associate</option>
<option>Pensioner</option>
<option>State servant</option>
<option>Student</option>
</select>
</div>

<div class="form-group">
<label>Education</label>
<select name="NAME_EDUCATION_TYPE">
<option>Higher education</option>
<option>Secondary / secondary special</option>
<option>Incomplete higher</option>
<option>Lower secondary</option>
<option>Academic degree</option>
</select>
</div>

<div class="form-group">
<label>Family Status</label>
<select name="NAME_FAMILY_STATUS">
<option>Married</option>
<option>Civil marriage</option>
<option>Single / not married</option>
<option>Separated</option>
<option>Widow</option>
</select>
</div>

<div class="form-group">
<label>Housing Type</label>
<select name="NAME_HOUSING_TYPE">
<option>House / apartment</option>
<option>Rented apartment</option>
<option>Municipal apartment</option>
<option>With parents</option>
<option>Co-op apartment</option>
<option>Office apartment</option>
</select>
</div>

<div class="form-group">
<label>Occupation</label>
<select name="OCCUPATION_TYPE">
<option>Managers</option>
<option>Drivers</option>
<option>Laborers</option>
<option>Core staff</option>
<option>Accountants</option>
<option>Sales staff</option>
<option>Medicine staff</option>
<option>Cleaning staff</option>
<option>Cooking staff</option>
<option>High skill tech staff</option>
<option>IT staff</option>
<option>HR staff</option>
<option>Realty agents</option>
<option>Security staff</option>
<option>Secretaries</option>
<option>Private service staff</option>
<option>Low-skill Laborers</option>
<option>Waiters/barmen staff</option>
</select>
</div>

<div class="form-group">
<label>Age (Years)</label>
<input type="number" name="AGE" required>
</div>

<div class="form-group">
<label>Years Employed</label>
<input type="number" name="YEARS_EMPLOYED" required>
</div>

<div class="form-group">
<label>Family Members</label>
<input type="number" step="0.1" name="CNT_FAM_MEMBERS" required>
</div>

<div class="form-group">
<label>Children</label>
<input type="number" name="CNT_CHILDREN" value="0">
</div>

<div class="form-group">
<label>Work Phone</label>
<select name="FLAG_WORK_PHONE">
    <option value="0">No</option>
    <option value="1">Yes</option>
</select>
</div>

<div class="form-group">
<label>Email</label>
<select name="FLAG_EMAIL">
    <option value="0">No</option>
    <option value="1">Yes</option>
</select>
</div>

</div>

<!-- Hidden values required by the model -->

<input type="hidden" name="ID" value="500000">
<input type="hidden" name="FLAG_MOBIL" value="1">
<input type="hidden" name="FLAG_PHONE" value="0">

<div class="button-area">

<button type="submit">

Predict

</button>

</div>

</form>

</div>

</body>

</html>
